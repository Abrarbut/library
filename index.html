<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>library</title>
</head>

<body>
    <h1>Library Home Page</h1>
    <p>You can select a book to view its details.</p>
    <div>
        <label for="book-select">Choose a book:</label>
        <select id="book-select">
            <option value="">--Please choose an option--</option>
        </select>
    </div>

    <p>click "Add" button to add the book</p>
    <div>
        <button id="addButton">Add Book</button>
        <div>
            <label for="title">Title:</label>
            <input type="text" id="book-title" placeholder="Enter book title">
        </div>
        <div>
            <label for="author">Author:</label>
            <input type="text" id="author" placeholder="Enter book author">
        </div>
        <div>
            <label for="pages">Pages:</label>
            <input type="number" id="pages" placeholder="Enter number of pages">
        </div>
        <button id="doneButton">Done</button>
    </div>



    <script src="javascript/index.js"></script>

</body>

</html>
