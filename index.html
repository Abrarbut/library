<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>library</title>
    <link rel="stylesheet" href="style/index.css">
</head>

<body>
    <div class="header">
        <h1>Library Home Page</h1>
        <p>You can select a book to view its details.</p>
    </div>

    <div class="controls">
        <div class="add-book-form select-wrap">
            <label for="book-select">Choose a book:</label>
            <select id="book-select">
                <option value="">--Please choose an option--</option>
            </select>
            <p>click "New Book" to add the book</p>
            <button id="newBookButton" type="button">New Book</button>
        </div>

        <div class="form" style="display:none">
            <div>
                <label for="book-title">Title:</label>
                <input type="text" id="book-title" placeholder="Enter book title">
            </div>
            <div>
                <label for="book-author">Author:</label>
                <input type="text" id="book-author" placeholder="Enter book author">
            </div>
            <div>
                <label for="book-pages">Pages:</label>
                <input type="number" id="book-pages" placeholder="Enter number of pages" min="1" value="1">
            </div>
            <div>
                <label for="book-id">ID:</label>
                <input type="text" id="book-id" placeholder="Enter book ID">
            </div>

            <div class="button-row">
                <button id="addButton">Add Book</button>
                <button id="doneButton">Done</button>
            </div>
        </div>
    </div>

    <div id="bookDetails"></div>

    <div id="bookList"></div>

    <script src="javascript/index.js"></script>
</body>

</html>
