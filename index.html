<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>library</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 120px);
            gap: 5px;
            margin: 20px auto;
            justify-content: center;
        }

        .grid-item {
            width: 120px;
            height: 120px;
            background-color: #fff;
            border: 2px solid #333;
            font-size: 36px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .grid-item:hover {
            background-color: #f0f0f0;
        }

        .grid-item.x {
            color: blue;
        }

        .grid-item.o {
            color: red;
        }

        #status {
            font-size: 24px;
            margin: 20px;
            font-weight: bold;
        }

        #resetButton {
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
        }

        #resetButton:hover {
            background-color: #45a049;
        }
    </style>
</head>

<body>

    <h1>Tic Tac Toe</h1>
    <div id="status">Player X's Turn</div>
    
    <div class="grid-container" id="gameBoard">
        <div class="grid-item"></div>
        <div class="grid-item"></div>
        <div class="grid-item"></div>
        <div class="grid-item"></div>
        <div class="grid-item"></div>
        <div class="grid-item"></div>
        <div class="grid-item"></div>
        <div class="grid-item"></div>
        <div class="grid-item"></div>
    </div>
    
    <button id="resetButton">Reset Game</button>

    <script src="javascript/tictactoe.js"></script>

</body>

</html>
